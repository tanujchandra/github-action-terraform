on:
  push:
    branches:
    - main

permissions:
  id-token: write
  contents: read       

jobs:
  my_job:
    name: tanuj login
    runs-on: ubuntu-22.04

    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ 920555a7-0397-4228-8f71-057de5d7292c }}
          tenant-id: ${{ dfda6141-171b-4c9c-9397-e2443ca0f248 }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure CLI script
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az account show
